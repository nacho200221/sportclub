<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - SportClub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="encabezado">
        <a href="index.html">
            <img src="logo.png" alt="Logo SportClub" class="logo-principal">
        </a>
    </header>

    <main class="pantalla-centrada">
        <div class="caja-formulario">
            <h2>Iniciar Sesión</h2>
            
            <form id="form-login" class="formulario">
                <div class="grupo-input">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <p id="mensaje-error" style="color: #dc3545; font-size: 0.9em; text-align: center; display: none; margin-bottom: 10px; font-weight: bold;"></p>

                <button type="submit" class="boton-bloque" style="width: 100%; border: none; cursor: pointer;">Ingresar</button>
            </form>

            <div class="enlaces-extra">
                <p><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
                <br>
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </main>

<script src="login.js"></script>
</body>
</html>
