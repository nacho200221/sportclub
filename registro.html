<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="encabezado">
        <a href="index.html">
            <img src="logo.png" alt="Logo SportClub" class="logo-principal">
        </a>
    </header>

    <main class="pantalla-centrada">
        <div class="caja-formulario">
            <h2>Crear Cuenta</h2>
            
            <form class="formulario">
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="grupo-input">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Crea una contraseña" required>
                </div>

                <div class="grupo-input">
                    <label for="info-extra">Deporte o Interés (Opcional)</label>
                    <input type="text" id="info-extra" placeholder="Ej: Crossfit, Yoga, Pesas...">
                </div>

                <a href="login.html" class="boton-bloque">Registrar y Continuar</a>
            </form>

            <div class="enlaces-extra">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </main>

</body>
</html>
