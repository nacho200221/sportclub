<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - SportClub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="encabezado">
        <a href="index.html">
            <img src="logo.png" alt="Logo SportClub" class="logo-principal">
        </a>
    </header>

    <main class="pantalla-centrada">
        <div class="caja-formulario">
            <h2>Recuperar Contraseña</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #555;">
                Ingresa tu correo y te enviaremos las instrucciones.
            </p>
            
            <form class="formulario">
                <div class="grupo-input">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>

                <a href="login.html" class="boton-bloque">Enviar enlace</a>
            </form>

            <div style="background-color: #d4edda; color: #155724; padding: 10px; margin-top: 15px; border-radius: 5px; text-align: center; font-size: 0.9em;">
                ¡Listo! Si el correo existe, recibirás un mensaje pronto.
            </div>

            <div class="enlaces-extra">
                <p><a href="login.html">Volver al inicio de sesión</a></p>
            </div>
        </div>
    </main>

</body>
</html>
